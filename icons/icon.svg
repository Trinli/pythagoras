<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="roundedClip">
      <rect x="0" y="0" width="512" height="512" rx="96" />
    </clipPath>
  </defs>

  <rect width="512" height="512" rx="96" fill="#b5501f" />

  <g clip-path="url(#roundedClip)">
    <!-- inset frame, like a painted tile border -->
    <rect x="28" y="28" width="456" height="456" rx="76" fill="none" stroke="#f0e4c8" stroke-width="10" opacity="0.9" />

    <!-- right triangle, 3:4:5 proportions, right angle at bottom-left -->
    <path d="M150,140 L430,350 L150,350 Z" fill="#201a14" stroke="#f0e4c8" stroke-width="8" stroke-linejoin="round" />

    <!-- right-angle mark -->
    <polyline points="150,316 184,316 184,350" fill="none" stroke="#f0e4c8" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />

    <!-- vertex accents -->
    <circle cx="150" cy="140" r="16" fill="#f0e4c8" />
    <circle cx="430" cy="350" r="16" fill="#f0e4c8" />

    <!-- Greek key (meander) border -->
    <path d="M64,456 L64,408 L96,408 L96,440 L80,440 L80,424 L112,424 L112,456 L128,456
             L128,408 L160,408 L160,440 L144,440 L144,424 L176,424 L176,456 L192,456
             L192,408 L224,408 L224,440 L208,440 L208,424 L240,424 L240,456 L256,456
             L256,408 L288,408 L288,440 L272,440 L272,424 L304,424 L304,456 L320,456
             L320,408 L352,408 L352,440 L336,440 L336,424 L368,424 L368,456 L384,456
             L384,408 L416,408 L416,440 L400,440 L400,424 L432,424 L432,456 L448,456"
          fill="none" stroke="#f0e4c8" stroke-width="14" stroke-linecap="square" stroke-linejoin="miter" />
  </g>
</svg>
