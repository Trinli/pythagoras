<!doctype html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Pythagoras</title>
  <meta name="description" content="Räkna ut sidor och vinklar i en rätvinklig triangel." />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pythagoras" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <div class="triangle-wrap" id="triangle-wrap">
      <svg id="triangle-svg" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Triangeldiagram"></svg>

      <input id="input-a" class="tri-input tri-input-standalone" type="number" inputmode="decimal" step="any" min="0" aria-label="Katet" />
      <input id="input-b" class="tri-input tri-input-standalone" type="number" inputmode="decimal" step="any" min="0" aria-label="Katet" />
      <input id="input-c" class="tri-input tri-input-standalone" type="number" inputmode="decimal" step="any" min="0" aria-label="Hypotenusa" />

      <div class="tri-angle-wrap" id="wrap-alpha">
        <input id="input-alpha" class="tri-input tri-input-angle" type="number" inputmode="decimal" step="any" min="0" max="89.99" aria-label="Vinkel" />
        <span class="deg-suffix">°</span>
      </div>
      <div class="tri-angle-wrap" id="wrap-beta">
        <input id="input-beta" class="tri-input tri-input-angle" type="number" inputmode="decimal" step="any" min="0" max="89.99" aria-label="Vinkel" />
        <span class="deg-suffix">°</span>
      </div>
    </div>

    <p id="status" class="status" role="status" aria-live="polite"></p>

    <button type="button" id="reset-btn" class="reset-btn">Töm</button>
  </main>

  <script src="app.js"></script>
</body>
</html>
